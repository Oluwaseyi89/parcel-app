<!DOCTYPE html>
<html>
<head>
    <title>Email Templates Preview</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .template { margin: 20px 0; padding: 20px; border: 1px solid #ddd; }
        .template h3 { margin-top: 0; }
        .email-content { background: #f9f9f9; padding: 15px; border: 1px solid #eee; }
    </style>
</head>
<body>
    <h1>Email Templates Preview</h1>
    
    <div class="template">
        <h3>Vendor Activation Email</h3>
        <div class="email-content">
            {{ activate_vendor_email|safe }}
        </div>
    </div>
    
    <div class="template">
        <h3>Courier Activation Email</h3>
        <div class="email-content">
            {{ activate_courier_email|safe }}
        </div>
    </div>
    
    <div class="template">
        <h3>Vendor Password Reset Email</h3>
        <div class="email-content">
            {{ vendor_reset_email|safe }}
        </div>
    </div>
    
    <div class="template">
        <h3>Courier Password Reset Email</h3>
        <div class="email-content">
            {{ courier_reset_email|safe }}
        </div>
    </div>
</body>
</html>
